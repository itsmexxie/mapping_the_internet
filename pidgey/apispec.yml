openapi: 3.0.0
info:
  title: "Pidgey API"
  description: "A service that gathers information about an IPv4 address"
  version: "0.1.0"

paths:
  /ping:
    get:
      summary: "Ping the specified IP address and return whether it is online or offline."
      parameters:
        - name: address
          in: "query"
          required: true
          schema:
            type: integer
      responses:
        200:
          description: "IP status"
          content:
            application/json:
              schema:
                type: object
                properties:
                  online:
                    type: boolean
        400:
          description: "Malformed IP address specified"
  /health:
    get:
      summary: "Health status"
      responses:
        200:
          description: "OK"
  